services:
  iris-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: iris-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - IRIS_HOST=0.0.0.0
      - IRIS_PORT=8000
      - IRIS_LOG_LEVEL=info
      # 填入你的 API Key
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # 网关认证
      - IRIS_API_KEYS=${IRIS_API_KEYS:-}
      # 记忆系统
      - MEMORY_BACKEND=${MEMORY_BACKEND:-sqlite}
      # Ombre-Brain MCP 远程连接
      - OMBRE_MCP_URL=${OMBRE_MCP_URL:-}
      - OMBRE_MCP_TOKEN=${OMBRE_MCP_TOKEN:-}
      # 伪装配置
      - CLAUDE_DISGUISE_ENABLED=${CLAUDE_DISGUISE_ENABLED:-false}
      - OPENAI_DISGUISE_ENABLED=${OPENAI_DISGUISE_ENABLED:-false}
    volumes:
      - ../data:/app/data
      - ../config/personas:/app/config/personas
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

